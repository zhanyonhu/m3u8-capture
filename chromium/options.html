<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Internet File Downloader M3U8 Capture</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 24px; line-height: 1.5; }
    label { display: block; margin: 16px 0 6px; font-weight: 600; }
    .hint { color: #555; font-size: 13px; margin-top: 4px; }
    a { color: #0b57d0; }
    .row-enable { margin-top: 8px; font-weight: normal; }
    .row-enable input { margin-right: 8px; vertical-align: middle; }
  </style>
</head>
<body>
  <h1 id="heading"></h1>
  <p id="intro" class="hint"></p>
  <label for="bridgePort" id="labelBridgePort"></label>
  <input type="number" id="bridgePort" min="1" max="65535" step="1" style="width: 140px;" />
  <div id="hintBridgePort" class="hint"></div>

  <h2 id="headingPrivacy" style="font-size:1.05rem;margin-top:28px;margin-bottom:4px;font-weight:600"></h2>
  <p id="introPrivacy" class="hint" style="margin-bottom:12px"></p>
  <label class="row-enable" for="sendUa">
    <input type="checkbox" id="sendUa" />
    <span id="labelSendUa"></span>
  </label>
  <div id="hintSendUa" class="hint"></div>
  <label class="row-enable" for="sendCookie">
    <input type="checkbox" id="sendCookie" />
    <span id="labelSendCookie"></span>
  </label>
  <div id="hintSendCookie" class="hint"></div>
  <label class="row-enable" for="sendReferer">
    <input type="checkbox" id="sendReferer" />
    <span id="labelSendReferer"></span>
  </label>
  <div id="hintSendReferer" class="hint"></div>

  <div id="hintApply" class="hint" style="margin-top:16px;"></div>

  <p><button id="save" type="button"></button> <span id="status"></span></p>

  <script src="options.js"></script>
</body>
</html>
